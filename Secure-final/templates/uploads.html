<!DOCTYPE html>
<html>
<head>
    <title>Uploaded Files</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .container {
            padding: 30px;
        }

        h2 {
            margin-bottom: 20px;
            color: cyan;
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0,255,255,0.2);
        }

        .file-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px cyan;
        }

        .file-name {
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 6px 12px;
            margin: 5px 5px 0 0;
            border: none;
            border-radius: 8px;
            background: cyan;
            color: black;
            cursor: pointer;
            font-size: 12px;
            text-decoration: none;
        }

        .btn:hover {
            background: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .search {
            padding: 8px;
            border-radius: 8px;
            border: none;
            outline: none;
        }
        .delete-btn {
    background: #ff4d4d;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 12px;
}

.delete-btn:hover {
    background: #ff1a1a;
}

.back-btn {
    display: inline-block;
    margin-bottom: 15px;
    padding: 8px 14px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.back-btn:hover {
    transform: scale(1.05);
}

    </style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <h2>📁 Uploaded Files</h2>
        

        <input type="text" class="search" placeholder="Search file..." onkeyup="searchFile(this.value)">
    </div>
    <div class="top-bar">
    <a href="/dashboard" class="back-btn">🏠 Home</a>
</div>

    <div class="file-grid" id="fileList">
        {% for file in files %}
        <div class="file-card">
            <div class="file-name">{{ file }}</div>

            <a href="/uploads/{{ file }}" class="btn">Open</a>
            <a href="/uploads/{{ file }}" download class="btn">Download</a>
            <a href="{{ url_for('delete_file', filename=file) }}"
onclick="return confirm('Are you sure?')"
class="delete-btn">Delete</a>
       
            <button onclick="copyLink('{{ file }}')" class="btn">Share</button>

<script>
function copyLink(file) {
    fetch("/generate_link/" + encodeURIComponent(file))
    .then(res => res.text())
    .then(link => {
        navigator.clipboard.writeText(link)
        .then(() => {
            alert("Link copied 🔥");
        })
        .catch(() => {
            alert("Copy failed ❌");
        });
    })
    .catch(() => {
        alert("Server error ❌");
    });
}
</script>

   
        </div>
        {% endfor %}
    </div>
  
</div>

<script>
function searchFile(value) {
    let cards = document.querySelectorAll(".file-card");
    value = value.toLowerCase();

    cards.forEach(card => {
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(value) ? "block" : "none";
    });
}

function copyLink(file) {
    fetch("/generate_link/" + encodeURIComponent(file))
    .then(res => res.text())
    .then(link => {

        if (navigator.clipboard) {
            navigator.clipboard.writeText(link);
        } else {
            let temp = document.createElement("input");
            temp.value = link;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand("copy");
            document.body.removeChild(temp);
        }

        alert("Link copied 🔥");
    });
}
</script>

</body>
</html>
